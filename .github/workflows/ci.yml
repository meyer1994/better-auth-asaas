name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter better-auth-asaas test
      - run: pnpm --filter better-auth-asaas build
    
  example-nuxt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm run example:nuxt install --frozen-lockfile
      - run: pnpm run example:nuxt lint
      - run: pnpm run example:nuxt typecheck
      - run: pnpm run example:nuxt build

  example-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm run example:next install --frozen-lockfile
      - run: pnpm run example:next lint
      - run: pnpm run example:next typecheck
      - run: pnpm run example:next build